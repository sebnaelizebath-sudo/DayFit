<!DOCTYPE html>
<html>

<head>
    <title>Login - DayFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #224abe);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 400px;
        }

        .btn-google {
            background: #db4437;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: #c53727;
        }
    </style>
</head>

<body>
    <div class="card">
        <h4 class="text-center mb-4">Login to DayFit</h4>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
        {% endwith %}
        <form action="{{ url_for('auth.email_login') }}" method="POST">
            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
        </form>
        <div class="divider text-center"><span>OR</span></div>
        <a href="{{ url_for('auth.google_login') }}" class="btn btn-google w-100 mb-3">
            <img src="https://developers.google.com/identity/images/g-logo.png" width="20"> Continue with Google
        </a>
        <p class="text-center">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
    </div>
</body>

</html>
