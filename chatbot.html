<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DayFit AI Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0b1120;
            color: white;
        }

        .navbar {
            background: #111827;
        }

        .chat-box {
            max-width: 900px;
            margin: auto;
        }

        .messages {
            background: rgba(255, 255, 255, 0.05);
            height: 500px;
            overflow-y: auto;
            border-radius: 18px;
            padding: 20px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 75%;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #1f2937;
        }

        input {
            background: #111827;
            color: white;
            border: 1px solid #374151;
        }

        .footer {
            background: #111827;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold">DayFit AI</a>
            <div>
                <a href="{{ url_for('dashboard.dashboard') }}" class="text-white me-3">Dashboard</a>
                <a href="{{ url_for('favorites.favorites') }}" class="text-white me-3">Favorites</a>
                <a href="{{ url_for('auth.logout') }}" class="text-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5 chat-box">
        <h3 class="mb-3">AI Style Assistant</h3>
        <div class="messages mb-3" id="messages">
            <div class="msg bot">Hi 👋 Ask me outfit suggestions</div>
        </div>
        <div class="input-group">
            <input id="msgInput" class="form-control" placeholder="Type message...">
            <button class="btn btn-primary" onclick="sendMsg()">Send</button>
        </div>
    </div>

    <div class="footer text-center">
        DayFit AI Fashion Assistant
    </div>

    <script>
        function addMessage(text, cls) {
            let div = document.createElement("div");
            div.className = "msg " + cls;
            div.innerText = text;
            document.getElementById("messages").appendChild(div);
            div.scrollIntoView({ behavior: "smooth" });
        }

        function sendMsg() {
            let input = document.getElementById("msgInput");
            let text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            fetch("/chatbot/message", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            })
                .then(r => r.json())
                .then(d => {
                    addMessage(d.response, "bot");
                })
                .catch(err => {
                    addMessage("Sorry, something went wrong.", "bot");
                });
        }

        // Allow Enter key to send
        document.getElementById("msgInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") sendMsg();
        });
    </script>
</body>

</html>
